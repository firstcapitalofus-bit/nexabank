<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaBank — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0c0e1a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  width: 100%;
  max-width: 420px;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-text {
  font-size: 2rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: -1px;
}
.logo-text span { color: #2563ff; }
.logo-sub {
  font-size: 0.75rem;
  color: #5a607a;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}
.card {
  background: #111318;
  border: 1px solid #1e2130;
  border-radius: 16px;
  padding: 28px 24px;
}
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  background: #0c0e1a;
  border-radius: 10px;
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  border-radius: 8px;
  color: #5a607a;
  transition: all 0.2s;
  border: none;
  background: transparent;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.tab.active {
  background: #2563ff;
  color: #fff;
}
.form { display: none; }
.form.active { display: block; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 0.7rem;
  color: #5a607a;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  font-weight: 600;
}
.field input, .field select {
  width: 100%;
  background: #0c0e1a;
  border: 1px solid #1e2130;
  border-radius: 8px;
  padding: 12px 14px;
  color: #e8eaf0;
  font-size: 0.9rem;
  font-family: 'Segoe UI', Arial, sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus {
  border-color: #2563ff;
}
.field select option { background: #0c0e1a; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn {
  width: 100%;
  padding: 13px;
  background: #2563ff;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Segoe UI', Arial, sans-serif;
  transition: background 0.2s;
  margin-top: 4px;
}
.btn:hover { background: #1d4fd8; }
.btn:disabled { background: #2a2d3a; color: #5a607a; cursor: not-allowed; }
.divider {
  text-align: center;
  color: #5a607a;
  font-size: 0.72rem;
  margin: 16px 0;
  position: relative;
}
.divider::before, .divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 40%;
  height: 1px;
  background: #1e2130;
}
.divider::before { left: 0; }
.divider::after { right: 0; }
.msg {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 14px;
  display: none;
}
.msg.error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); display: block; }
.msg.success { background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2); display: block; }
.terms {
  font-size: 0.68rem;
  color: #5a607a;
  text-align: center;
  margin-top: 12px;
  line-height: 1.5;
}
.footer-note {
  text-align: center;
  margin-top: 20px;
  font-size: 0.72rem;
  color: #5a607a;
}
.footer-note a { color: #2563ff; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-text">Nexa<span>Bank</span></div>
    <div class="logo-sub">Secure Online Banking</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div class="form active" id="form-login">
      <div class="msg" id="login-msg"></div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@email.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()" id="login-btn">Sign In</button>
      <div class="terms" style="margin-top:14px">
        <a href="#" style="color:#2563ff;font-size:0.72rem">Forgot password?</a>
      </div>
    </div>

    <!-- REGISTER -->
    <div class="form" id="form-register">
      <div class="msg" id="reg-msg"></div>
      <div class="row2">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="reg-first" placeholder="John">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="reg-last" placeholder="Doe">
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@email.com">
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="+1 305 000 0000">
      </div>
      <div class="field">
        <label>Account Type</label>
        <select id="reg-type">
          <option value="checking">Checking Account</option>
          <option value="savings">Savings Account</option>
          <option value="business">Business Account</option>
        </select>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min 8 characters">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="reg-pass2" placeholder="Repeat password">
      </div>
      <button class="btn" onclick="register()" id="reg-btn">Create Account</button>
      <div class="terms">By registering you agree to NexaBank's Terms of Service and Privacy Policy</div>
    </div>
  </div>

  <div class="footer-note">
    🔒 256-bit SSL encrypted · FDIC insured
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dicvkqfdaocubcuqlvjy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpY3ZrcWZkYW9jdWJjdXFsdmp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDExODUsImV4cCI6MjA5MDQxNzE4NX0.gBF1idyMCqXKHwwPEbaYAXN-YGAH3EOfEVBmt80Jiac';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  document.getElementById('form-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'msg ' + type;
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showMsg('login-msg', 'Please fill in all fields', 'error'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showMsg('login-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    showMsg('login-msg', 'Welcome back! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  }
}

async function register() {
  const first = document.getElementById('reg-first').value.trim();
  const last  = document.getElementById('reg-last').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const type  = document.getElementById('reg-type').value;
  const pass  = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;

  if (!first || !last || !email || !pass) { showMsg('reg-msg', 'Please fill in all required fields', 'error'); return; }
  if (pass !== pass2) { showMsg('reg-msg', 'Passwords do not match', 'error'); return; }
  if (pass.length < 8) { showMsg('reg-msg', 'Password must be at least 8 characters', 'error'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) {
    showMsg('reg-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
    return;
  }

  // Save profile
  const acctNum = '****' + Math.floor(1000 + Math.random() * 9000);
  await sb.from('profiles').insert({
    id: data.user.id,
    first_name: first,
    last_name: last,
    email: email,
    phone: phone,
    account_type: type,
    account_number: acctNum,
    balance: 0.00,
    status: 'active',
    created_at: new Date().toISOString()
  });

  showMsg('reg-msg', '✅ Account created! Please check your email to verify then sign in.', 'success');
  btn.disabled = false; btn.textContent = 'Create Account';
}

// Check if already logged in
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
